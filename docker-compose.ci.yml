services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: papeleria_db
      MYSQL_USER: papeleria
      MYSQL_PASSWORD: papeleria123
      MYSQL_ROOT_PASSWORD: root123
      TZ: UTC
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
