services:
  mysql:
    image: mysql:8.4
    container_name: papeleria_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: papeleria_db
      MYSQL_USER: papeleria
      MYSQL_PASSWORD: papeleria123
      MYSQL_ROOT_PASSWORD: root123
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: papeleria_api
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
